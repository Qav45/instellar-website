document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n          <\u002Fdiv>\n\n          <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n            <label style=\"font-weight: 600; font-size: 15px; color: {{ t.text }};\">Anything else we should know?<\u002Flabel>\n            <textarea rows=\"2\" name=\"extra\" style=\"background: {{ t.inputBg }}; color: {{ t.text }}; border: 1px solid {{ t.inputBorder }}; border-radius: 14px; padding: 14px 18px; font-size: 15px; line-height: 1.55; font-family: 'Manrope', sans-serif; outline: none; box-shadow: inset 0 1px 2px rgba(0,0,0,0.10); transition: border-color .15s ease, box-shadow .15s ease, background .15s ease; resize: vertical;\" style-focus=\"border-color: {{ t.text }}; box-shadow: inset 0 1px 2px rgba(0,0,0,0.06), 0 0 0 4px color-mix(in srgb, {{ t.text }} 10%, transparent);\"><\u002Ftextarea>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ error }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background: {{ t.errBg }}; border: 1px solid {{ t.errBorder }}; border-radius: 12px; padding: 12px 16px; font-size: 14px; color: {{ t.errText }};\">{{ error }}<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <button onclick=\"{{ submitAppeal }}\" style=\"border: none; background: {{ t.pillBg }}; color: {{ t.pillText }}; font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 16px; padding: 15px; border-radius: 999px; cursor: pointer;\" style-hover=\"opacity: 0.9;\">{{ appealSubmitLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position: relative; overflow: hidden; padding: 56px 28px; display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center;\">\n          <div style=\"position: absolute; inset: 0; pointer-events: none;\">\n            <sc-for list=\"{{ confetti }}\" as=\"p\" hint-placeholder-count=\"0\">\n              <span style=\"position: absolute; top: -12px; left: {{ p.left }}%; width: {{ p.size }}px; height: {{ p.size }}px; background: {{ p.color }}; border-radius: {{ p.radius }}px; animation: confettiFall {{ p.dur }}s {{ p.delay }}s ease-in forwards;\"><\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"width: 56px; height: 56px; border-radius: 50%; background: {{ t.okBg }}; display: flex; align-items: center; justify-content: center; animation: popIn .5s cubic-bezier(0.3, 1.4, 0.5, 1) backwards;\">\n            <svg width=\"24\" height=\"24\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"{{ t.okIcon }}\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12.5l4.5 4.5L19 7.5\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <span style=\"font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 22px; color: {{ t.text }};\">Appeal submitted<\u002Fspan>\n          <span style=\"font-size: 15px; color: {{ t.muted }}; line-height: 1.6; max-width: 380px;\">Your appeal has been sent. The moderation team will review it as soon as possible.<\u002Fspan>\n          <button onclick=\"{{ close }}\" style=\"margin-top: 8px; border: none; background: {{ t.pillBg }}; color: {{ t.pillText }}; font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 15px; padding: 12px 32px; border-radius: 999px; cursor: pointer;\">Done<\u002Fbutton>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;serverName&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Instellar&quot;, &quot;tsType&quot;: &quot;string&quot;},\n  &quot;defaultTheme&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;dark&quot;, &quot;light&quot;], &quot;default&quot;: &quot;dark&quot;, &quot;tsType&quot;: &quot;string&quot;},\n  &quot;supabaseUrl&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;https://jaednahuxpjwrqjqytrt.supabase.co&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Supabase&quot;},\n  &quot;supabaseKey&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Supabase&quot;}\n}\">\nconst THEMES = {\n  dark: {\n    desk: \"#000000\", sheet: \"#0b0b0f\", divider: \"#1c1c23\",\n    text: \"#f4f4f7\", muted: \"#9c9ca8\", reqText: \"#c9c9d3\",\n    card: \"#15151c\", cardBorder: \"#232330\",\n    inputBg: \"#101016\", inputBorder: \"#2a2a36\",\n    pillBg: \"#f4f4f7\", pillText: \"#111116\", pillCircle: \"#d8d8e0\",\n    staffIconBg: \"#2b2440\", staffIcon: \"#a48ae8\",\n    appealIconBg: \"#1e2c3f\", appealIcon: \"#74aae8\",\n    okBg: \"#1c3328\", okIcon: \"#4cc282\",\n    errBg: \"#3a2020\", errBorder: \"#5a3030\", errText: \"#f08a80\"\n  },\n  light: {\n    desk: \"#eceef1\", sheet: \"#ffffff\", divider: \"#eef0f3\",\n    text: \"#16161d\", muted: \"#7a7a85\", reqText: \"#4a4a55\",\n    card: \"#f7f8fa\", cardBorder: \"#eceef1\",\n    inputBg: \"#ffffff\", inputBorder: \"#e3e5ea\",\n    pillBg: \"#1e1e28\", pillText: \"#ffffff\", pillCircle: \"#33333f\",\n    staffIconBg: \"#efe9fc\", staffIcon: \"#7c5cd6\",\n    appealIconBg: \"#e3f1fc\", appealIcon: \"#4d8fd6\",\n    okBg: \"#e5f6ec\", okIcon: \"#3aa96c\",\n    errBg: \"#fdefee\", errBorder: \"#f5d0cd\", errText: \"#c0453d\"\n  }\n};\n\nclass Component extends DCLogic {\n  state = { modal: null, submitted: false, sending: false, error: null, toast: null, server: ([\"1\",\"2\"].includes(new URLSearchParams(location.search).get(\"server\")) ? new URLSearchParams(location.search).get(\"server\") : null), theme: localStorage.getItem(\"instellar_theme\") || this.props.defaultTheme || \"dark\" };\n  staffFormRef = React.createRef();\n  appealFormRef = React.createRef();\n\n  pickServer(n) {\n    try {\n      const u = new URL(location.href);\n      u.searchParams.set(\"server\", n);\n      history.replaceState(null, \"\", u);\n    } catch (e) {}\n    if (this.state.server && this.state.server !== n) {\n      clearTimeout(this._toastTimer);\n      this.setState({ server: n, toast: \"Switched to Instellar \" + n });\n      this._toastTimer = setTimeout(() => this.setState({ toast: null }), 1800);\n    } else {\n      this.setState({ server: n });\n    }\n  }\n\n  getClient() {\n    const url = this.props.supabaseUrl || \"https://jaednahuxpjwrqjqytrt.supabase.co\";\n    const key = this.props.supabaseKey || \"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImphZWRuYWh1eHBqd3JxanF5dHJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MzgwODQsImV4cCI6MjA5OTIxNDA4NH0.N30ZCl1afMAMFGd-D--5Ulq7VP4qB9aiBQbdRmwDumQ\";\n    if (!this._client) this._client = window.supabase.createClient(url, key);\n    return this._client;\n  }\n\n  collect(ref) {\n    const out = {};\n    if (!ref.current) return out;\n    ref.current.querySelectorAll(\"input, textarea\").forEach((el) => {\n      if (!el.name) return;\n      if (el.type === \"radio\") { if (el.checked) out[el.name] = el.value; }\n      else if (el.type === \"checkbox\") { out[el.name] = el.checked ? \"Yes\" : \"No\"; }\n      else { out[el.name] = el.value.trim().slice(0, 2000); }\n    });\n    return out;\n  }\n\n  async send(table, data, required, title, color) {\n    for (const f of required) {\n      if (!data[f]) { this.setState({ error: \"Please fill in all required (*) fields.\" }); return; }\n    }\n    const cdKey = \"instellar_cooldown_\" + table;\n    const last = Number(localStorage.getItem(cdKey) || 0);\n    const remaining = 24 * 60 * 60 * 1000 - (Date.now() - last);\n    if (remaining > 0) {\n      const hrs = Math.ceil(remaining / 3600000);\n      this.setState({ error: \"You already submitted recently. Try again in about \" + hrs + \" hour\" + (hrs === 1 ? \"\" : \"s\") + \".\" });\n      return;\n    }\n    const longFields = [\"why_staff\", \"opinion\", \"scenario_arguing\", \"scenario_staff\", \"scenario_toxic\", \"scenario_cheating\", \"why_unban\"];\n    for (const f of longFields) {\n      if (data[f] !== undefined && required.includes(f) && data[f].length < 15) {\n        this.setState({ error: \"Please write a proper answer for every question (a few words minimum).\" });\n        return;\n      }\n    }\n    if (data.age !== undefined && (!/^\\d{1,2}$/.test(data.age) || Number(data.age) < 8)) {\n      this.setState({ error: \"Please enter a valid age.\" });\n      return;\n    }\n    data.server = \"Instellar \" + (this.state.server || \"?\");\n    this.setState({ sending: true, error: null });\n    try {\n      // Insert only. The Discord notification is sent SERVER-side by a\n      // Supabase database trigger / Edge Function (see SETUP.md), so the\n      // webhook URL is never exposed in the browser. title/color are unused\n      // client-side but kept so the caller documents each form's intent.\n      void title; void color;\n      const { error } = await this.getClient().from(table).insert(data);\n      if (error) { this.setState({ sending: false, error: \"Could not submit: \" + error.message }); return; }\n      localStorage.setItem(cdKey, String(Date.now()));\n      this.setState({ sending: false, submitted: true });\n    } catch (e) {\n      this.setState({ sending: false, error: \"Could not submit: \" + e.message });\n    }\n  }\n\n  getConfetti() {\n    if (!this.state.submitted) { this._confetti = null; return []; }\n    if (!this._confetti) {\n      const colors = [\"#a48ae8\", \"#74aae8\", \"#4cc282\", \"#f0c060\", \"#f08a80\", \"#e878b8\"];\n      this._confetti = Array.from({ length: 50 }, () => ({\n        left: Math.round(Math.random() * 100),\n        size: 5 + Math.round(Math.random() * 5),\n        radius: Math.random() < 0.5 ? 1 : 6,\n        color: colors[Math.floor(Math.random() * colors.length)],\n        dur: (1.8 + Math.random() * 1.6).toFixed(2),\n        delay: (Math.random() * 0.8).toFixed(2)\n      }));\n    }\n    return this._confetti;\n  }\n\n  renderVals() {\n    const sending = this.state.sending;\n    const theme = this.state.theme;\n    const tt = THEMES[theme] || THEMES.dark;\n    const srv = this.state.server;\n    return {\n      t: THEMES[theme] || THEMES.dark,\n      themeIcon: theme === \"dark\" ? \"☀️\" : \"🌙\",\n      toggleTheme: () => {\n        const next = theme === \"dark\" ? \"light\" : \"dark\";\n        localStorage.setItem(\"instellar_theme\", next);\n        this.setState({ theme: next });\n      },\n      serverName: (this.props.serverName ?? \"Instellar\") + (this.state.server ? \" \" + this.state.server : \"\"),\n      needsServer: !this.state.server,\n      hasServer: !!this.state.server,\n      toast: this.state.toast,\n      s1Bg: srv === \"1\" ? tt.pillBg : tt.card,\n      s1Color: srv === \"1\" ? tt.pillText : tt.text,\n      s1Border: srv === \"1\" ? tt.pillBg : tt.cardBorder,\n      s2Bg: srv === \"2\" ? tt.pillBg : tt.card,\n      s2Color: srv === \"2\" ? tt.pillText : tt.text,\n      s2Border: srv === \"2\" ? tt.pillBg : tt.cardBorder,\n      goHome: (e) => {\n        e.preventDefault();\n        const atRoot = location.pathname.replace(/[^/]*$/, \"\") === \"/apply/\";\n        location.href = atRoot ? \"/\" : \"../index.html\";\n      },\n      pickServer1: () => this.pickServer(\"1\"),\n      pickServer2: () => this.pickServer(\"2\"),\n      confetti: this.getConfetti(),\n      staffOpen: this.state.modal === \"staff\",\n      appealOpen: this.state.modal === \"appeal\",\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      error: this.state.error,\n      staffFormRef: this.staffFormRef,\n      appealFormRef: this.appealFormRef,\n      staffSubmitLabel: sending ? \"Submitting…\" : \"Submit application\",\n      appealSubmitLabel: sending ? \"Submitting…\" : \"Submit appeal\",\n      openStaff: () => this.setState({ modal: \"staff\", submitted: false, error: null }),\n      openAppeal: () => this.setState({ modal: \"appeal\", submitted: false, error: null }),\n      close: () => this.setState({ modal: null, submitted: false, error: null }),\n      submitStaff: () => {\n        if (sending) return;\n        const data = this.collect(this.staffFormRef);\n        this.send(\"staff_applications\", data, [\"meets_requirements\", \"age\", \"minecraft_username\", \"discord_username\", \"linked\", \"why_staff\", \"opinion\", \"scenario_arguing\", \"scenario_staff\", \"scenario_toxic\", \"scenario_cheating\"], \"📋 New Staff Application\", 8087254);\n      },\n      submitAppeal: () => {\n        if (sending) return;\n        const data = this.collect(this.appealFormRef);\n        this.send(\"ban_appeals\", data, [\"minecraft_username\", \"discord_username\", \"ban_reason\", \"why_unban\"], \"🛡️ New Ban Appeal\", 5083094);\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
