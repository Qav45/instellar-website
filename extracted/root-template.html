<style>
  html, body { margin: 0; height: 100%; background: #000000; font-family: 'Manrope', sans-serif; }
  a { color: inherit; text-decoration: none; }
  a:hover { color: inherit; }
  .sb { width: 76px; transition: width .28s cubic-bezier(0.2, 0.8, 0.3, 1); overflow: hidden; }
  .sb:hover { width: 224px; }
  .sb .sb-label { opacity: 0; transform: translateX(-8px); transition: opacity .18s ease, transform .28s cubic-bezier(0.2, 0.8, 0.3, 1); white-space: nowrap; }
  .sb:hover .sb-label { opacity: 1; transform: translateX(0); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes modalIn { from { opacity: 0; transform: translateY(24px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
</style>
</helmet>

<div style="min-height: 100vh; background: #000000; padding: 16px; box-sizing: border-box; display: flex; gap: 16px;">

  <div class="sb" style="flex-shrink: 0; background: #0b0b0f; border-radius: 24px; padding: 20px 14px; box-sizing: border-box; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.05);">
    <span class="sb-label" style="font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #9c9ca8; padding: 4px 10px 6px;">Server</span>
    <button onclick="{{ pick1 }}" title="Instellar 1" style="display: flex; align-items: center; gap: 12px; border: none; background: transparent; padding: 4px; border-radius: 999px; cursor: pointer;" style-hover="background: #15151c;">
      <span style="width: 40px; height: 40px; flex-shrink: 0; border-radius: 50%; border: 1px solid #232330; background: #15151c; color: #f4f4f7; display: flex; align-items: center; justify-content: center; font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 15px; box-sizing: border-box;">1</span>
      <span class="sb-label" style="font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 14px; color: #f4f4f7;">Instellar 1</span>
    </button>
    <button onclick="{{ pick2 }}" title="Instellar 2" style="display: flex; align-items: center; gap: 12px; border: none; background: transparent; padding: 4px; border-radius: 999px; cursor: pointer;" style-hover="background: #15151c;">
      <span style="width: 40px; height: 40px; flex-shrink: 0; border-radius: 50%; border: 1px solid #232330; background: #15151c; color: #f4f4f7; display: flex; align-items: center; justify-content: center; font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 15px; box-sizing: border-box;">2</span>
      <span class="sb-label" style="font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 14px; color: #f4f4f7;">Instellar 2</span>
    </button>
    <div style="flex: 1;"></div>
    <a href="{{ applyHref }}" onclick="{{ applyClick }}" title="Apply" style="display: flex; align-items: center; gap: 12px; padding: 4px; border-radius: 999px; cursor: pointer;" style-hover="background: #15151c;">
      <span style="width: 40px; height: 40px; flex-shrink: 0; border-radius: 50%; border: 1px solid #232330; background: #15151c; color: #f4f4f7; display: flex; align-items: center; justify-content: center; box-sizing: border-box;"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M13 6l6 6-6 6"></path></svg></span>
      <span class="sb-label" style="font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 14px; color: #f4f4f7;">Apply</span>
    </a>
  </div>

  <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; padding: 40px 24px; box-sizing: border-box;">

  

  <h1 style="animation: fadeUp .7s ease both; font-family: 'Poppins', sans-serif; font-weight: 700; font-size: clamp(44px, 9vw, 96px); line-height: 1; margin: 0; color: #ffffff; letter-spacing: -2px; text-align: center;">Coming Soon!</h1>

  <a href="{{ applyHref }}" onclick="{{ applyClick }}" style="animation: fadeUp .7s ease both; animation-delay: .12s; display: inline-flex; align-items: center; gap: 10px; padding: 16px 36px; border-radius: 999px; background: #ffffff; color: #000000; font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 16px;">Apply now <span style="font-size: 18px;">→</span></a>


  <sc-if value="{{ choiceOpen }}" hint-placeholder-val="{{ false }}">
    <div onclick="{{ closeChoice }}" style="position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; padding: 24px; box-sizing: border-box; z-index: 50; animation: fadeIn .2s ease backwards;">
      <div onclick="{{ stopClick }}" style="background: #0b0b0f; border: 1px solid #232330; border-radius: 24px; padding: 40px 36px; width: 460px; max-width: 100%; box-sizing: border-box; display: flex; flex-direction: column; gap: 10px; align-items: center; box-shadow: 0 24px 60px rgba(0,0,0,0.5); animation: modalIn .3s cubic-bezier(0.2, 0.9, 0.3, 1.15) backwards;">
        <span style="font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 24px; color: #f4f4f7; text-align: center;">Which server?</span>
        <span style="font-size: 15px; color: #9c9ca8; text-align: center;">Choose the server you want to apply for.</span>
        <div style="display: flex; gap: 14px; align-self: stretch; margin-top: 16px;">
          <button onclick="{{ pick1 }}" style="flex: 1; border: none; background: #f4f4f7; color: #111116; font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 16px; padding: 16px; border-radius: 999px; cursor: pointer;" style-hover="opacity: 0.9;">Instellar 1</button>
          <button onclick="{{ pick2 }}" style="flex: 1; border: 1px solid #2a2a36; background: #15151c; color: #f4f4f7; font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 16px; padding: 16px; border-radius: 999px; cursor: pointer;" style-hover="background: #1c1c25;">Instellar 2</button>
        </div>
      </div>
    </div>
  </sc-if>

  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script="" data-props="{
  &quot;applyHref&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;apply/&quot;, &quot;tsType&quot;: &quot;string&quot;}
}">
class Component extends DCLogic {
  state = { choiceOpen: false };
  go(n) {
    const rootHosted = location.pathname.replace(/[^/]*$/, "") === "/";
    location.href = (rootHosted ? "/apply/" : "apply/index.html") + "?server=" + n;
  }
  renderVals() {
    return {
      applyHref: this.props.applyHref ?? "apply/",
      applyClick: (e) => { e.preventDefault(); this.setState({ choiceOpen: true }); },
      choiceOpen: this.state.choiceOpen,
      closeChoice: () => this.setState({ choiceOpen: false }),
      stopClick: (e) => e.stopPropagation(),
      pick1: () => this.go(1),
      pick2: () => this.go(2)
    };
  }
}
</script>
