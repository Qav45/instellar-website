  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e',system-ui,sans-serif;background:var(--bg);color:var(--text);\n--bg:#000000;--surface:#15151c;--raised:#1d1d26;--line:#232330;--soft:rgba(255,255,255,.05);\n--text:#f4f4f7;--muted:#9c9ca8;--accent:#f4f4f7;--on-accent:#111116;--ok:#3DC98B;--warn:#E8A33D;--danger:#EF6461;--violet:#8B7CF6;\n--shadow:0 10px 30px rgba(0,0,0,.35);--shadow-lg:0 24px 64px rgba(0,0,0,.5)}\nbody.light{--bg:#eceef1;--surface:#f7f8fa;--raised:#ffffff;--line:#e3e5ea;--soft:rgba(20,25,40,.05);\n--text:#16161d;--muted:#7a7a85;--accent:#1e1e28;--on-accent:#ffffff;--shadow:0 8px 24px rgba(25,35,60,.08);--shadow-lg:0 24px 64px rgba(25,35,60,.18)}\na{color:var(--accent);text-decoration:none}a:hover{color:var(--text)}\ninput,textarea,button,select{font-family:inherit}\n::placeholder{color:var(--muted);opacity:.7}\n*{scrollbar-width:none;-ms-overflow-style:none}\n*::-webkit-scrollbar{display:none;width:0;height:0}\n@keyframes mp-pulse{0%,100%{opacity:1}50%{opacity:.35}}\n@keyframes mp-spin{to{transform:rotate(360deg)}}\n@keyframes mp-slide{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}\n@keyframes mp-pop{from{transform:scale(.96) translateY(8px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}\n@keyframes mp-toast{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}\n@keyframes mp-fade{from{opacity:0}to{opacity:1}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<sc-if value=\"{{ isLogin }}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Login\" style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px\">\n  <div style=\"width:380px;max-width:100%;display:flex;flex-direction:column;gap:22px;animation:mp-pop .35s ease\">\n    <div style=\"display:flex;flex-direction:column;align-items:center;gap:14px\">\n      \n      <div style=\"text-align:center\">\n        <div style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:16px;letter-spacing:.22em\">INSTELLAR<\u002Fdiv>\n        <div style=\"font-size:13.5px;color:var(--muted);margin-top:4px\">Sign in to the moderation panel<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:26px;display:flex;flex-direction:column;gap:14px;box-shadow:var(--shadow)\">\n      <div style=\"display:flex;flex-direction:column;gap:6px\">\n        <label style=\"font-size:12.5px;font-weight:600;color:var(--muted)\">Username<\u002Flabel>\n        <input value=\"{{ loginUser }}\" sc-camel-on-change=\"{{ onLoginUser }}\" placeholder=\"Username\" style=\"background:var(--raised);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:14px;color:var(--text);outline:none;transition:border-color .15s\" style-focus=\"border-color:var(--accent)\">\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:6px\">\n        <label style=\"font-size:12.5px;font-weight:600;color:var(--muted)\">Password<\u002Flabel>\n        <input type=\"password\" value=\"{{ loginPw }}\" sc-camel-on-change=\"{{ onLoginPw }}\" sc-camel-on-key-down=\"{{ loginKey }}\" placeholder=\"Password\" style=\"background:var(--raised);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:14px;color:var(--text);outline:none;transition:border-color .15s\" style-focus=\"border-color:var(--accent)\">\n      <\u002Fdiv>\n      <sc-if value=\"{{ loginError }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;align-items:center;gap:8px;background:color-mix(in srgb, var(--danger) 10%, transparent);border-radius:11px;padding:10px 13px\">\n          <span style=\"width:7px;height:7px;border-radius:99px;background:var(--danger);flex:none\"><\u002Fspan>\n          <span style=\"font-size:12.5px;font-weight:600;color:var(--danger)\">{{ loginError }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <button sc-camel-on-click=\"{{ login }}\" style=\"margin-top:6px;background:var(--accent);color:var(--on-accent);border:none;border-radius:999px;padding:13px;font-size:14.5px;font-weight:700;cursor:pointer;transition:transform .1s, filter .15s\" style-hover=\"filter:brightness(1.1)\" style-active=\"transform:scale(.98)\">Sign in<\u002Fbutton>\n      <div style=\"display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px\"><div style=\"flex:1;height:1px;background:var(--line)\"><\u002Fdiv>or<div style=\"flex:1;height:1px;background:var(--line)\"><\u002Fdiv><\u002Fdiv>\n      <button sc-camel-on-click=\"{{ ssoClick }}\" style=\"background:var(--raised);color:var(--text);border:1px solid var(--line);border-radius:999px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s, transform .1s\" style-hover=\"background:var(--soft)\" style-active=\"transform:scale(.98)\">Continue with SSO<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"text-align:center;font-size:12.5px;color:var(--muted)\">Staff access only · contact an admin for an account<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isApp }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"display:flex;min-height:100vh;background:var(--bg)\">\n\n  <!-- Sidebar -->\n  <div style=\"width:240px;flex:none;display:flex;flex-direction:column;gap:8px;padding:20px 14px;border-right:1px solid var(--line);position:sticky;top:0;height:100vh;box-sizing:border-box\">\n    <div style=\"display:flex;align-items:center;gap:11px;padding:4px 10px 16px\">\n      <img src=\"d3bbe861-aad3-48bf-8738-f977bf8ddb7b\" alt=\"Instellar logo\" style=\"width:34px;height:34px;border-radius:11px;object-fit:cover;display:block;flex:none\">\n      <div>\n        <div style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;letter-spacing:.2em\">INSTELLAR<\u002Fdiv>\n        <div style=\"font-size:10.5px;color:var(--muted);font-weight:600;letter-spacing:.06em;text-transform:uppercase\">Moderation<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <sc-for list=\"{{ navItems }}\" as=\"n\" hint-placeholder-count=\"4\">\n      <button sc-camel-on-click=\"{{ n.go }}\" style=\"{{ n.style }}\" style-hover=\"{{ n.hover }}\" style-active=\"transform:scale(.98)\">\n        <span style=\"width:20px;height:20px;display:grid;place-items:center;flex:none\">\n          <sc-if value=\"{{ n.isDash }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 20 20\" fill=\"none\"><rect x=\"2\" y=\"2\" width=\"7\" height=\"7\" rx=\"2.4\" fill=\"currentColor\"><\u002Frect><rect x=\"11\" y=\"2\" width=\"7\" height=\"7\" rx=\"2.4\" fill=\"currentColor\" opacity=\".45\"><\u002Frect><rect x=\"2\" y=\"11\" width=\"7\" height=\"7\" rx=\"2.4\" fill=\"currentColor\" opacity=\".45\"><\u002Frect><rect x=\"11\" y=\"11\" width=\"7\" height=\"7\" rx=\"2.4\" fill=\"currentColor\"><\u002Frect><\u002Fsvg><\u002Fsc-if>\n          <sc-if value=\"{{ n.isPlayers }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 20 20\" fill=\"currentColor\"><circle cx=\"10\" cy=\"6.5\" r=\"3.4\"><\u002Fcircle><rect x=\"3.4\" y=\"11.6\" width=\"13.2\" height=\"6\" rx=\"3\" opacity=\".7\"><\u002Frect><\u002Fsvg><\u002Fsc-if>\n          <sc-if value=\"{{ n.isAudit }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M3 5h14\"><\u002Fpath><path d=\"M3 10h10\"><\u002Fpath><path d=\"M3 15h14\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n          <sc-if value=\"{{ n.isLogging }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 6l4 4-4 4\"><\u002Fpath><path d=\"M10 15h7\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n          <sc-if value=\"{{ n.isGuides }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10 4.5C8.5 3.3 6.5 3 4 3v12.5c2.5 0 4.5.3 6 1.5 1.5-1.2 3.5-1.5 6-1.5V3c-2.5 0-4.5.3-6 1.5z\"><\u002Fpath><path d=\"M10 4.5V17\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n          <sc-if value=\"{{ n.isStaff }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 20 20\" fill=\"currentColor\"><path d=\"M10 2l6.5 2.6v4.6c0 3.9-2.7 6.6-6.5 8.6-3.8-2-6.5-4.7-6.5-8.6V4.6z\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n        <\u002Fspan>\n        <span>{{ n.label }}<\u002Fspan>\n        <sc-if value=\"{{ n.count }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"margin-left:auto;font-size:11px;font-weight:700;background:var(--soft);color:var(--muted);border-radius:99px;padding:2px 8px\">{{ n.count }}<\u002Fspan><\u002Fsc-if>\n      <\u002Fbutton>\n    <\u002Fsc-for>\n    <div style=\"flex:1\"><\u002Fdiv>\n    <div style=\"border-top:1px solid var(--line);padding-top:12px;display:flex;flex-direction:column;gap:7px;padding-bottom:12px\">\n      <div style=\"font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:0 6px\">Server<\u002Fdiv>\n      <div style=\"display:flex;gap:6px\">\n        <sc-for list=\"{{ serverOpts }}\" as=\"sv\" hint-placeholder-count=\"2\">\n          <button sc-camel-on-click=\"{{ sv.pick }}\" style=\"{{ sv.style }}\" style-active=\"transform:scale(.97)\">{{ sv.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid var(--line);padding-top:14px;display:flex;align-items:center;gap:10px;padding-left:6px;padding-right:6px\">\n      <div style=\"width:34px;height:34px;border-radius:11px;background:{{ meAvBg }};display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px;flex:none\">{{ meInitial }}<\u002Fdiv>\n      <div style=\"min-width:0;flex:1\">\n        <div style=\"font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ meName }}<\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--muted)\">{{ meRole }}<\u002Fdiv>\n      <\u002Fdiv>\n      <button sc-camel-on-click=\"{{ logout }}\" title=\"Sign out\" style=\"background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;border-radius:8px;transition:background .15s,color .15s\" style-hover=\"background:var(--soft);color:var(--text)\">\n        <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 20 20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M12 4H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h6\"><\u002Fpath><path d=\"M9 10h8\"><\u002Fpath><path d=\"M14 7l3 3-3 3\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Main column -->\n  <div style=\"flex:1;min-width:0;display:flex;flex-direction:column\">\n\n    <!-- Header -->\n    <div style=\"display:flex;align-items:center;gap:14px;padding:16px 28px;border-bottom:1px solid var(--line);position:sticky;top:0;background:color-mix(in srgb, var(--bg) 88%, transparent);backdrop-filter:blur(12px);z-index:20\">\n      <div style=\"font-family:'Poppins',sans-serif;font-weight:600;font-size:17px\">{{ pageTitle }}<\u002Fdiv>\n      <span style=\"font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);background:var(--soft);border:1px solid var(--line);border-radius:99px;padding:4px 11px\">{{ serverBadge }}<\u002Fspan>\n      <div style=\"flex:1\"><\u002Fdiv>\n      <button sc-camel-on-click=\"{{ toggleTheme }}\" style=\"background:var(--surface);border:1px solid var(--line);border-radius:99px;padding:7px 14px;font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer;transition:background .15s,color .15s\" style-hover=\"background:var(--raised);color:var(--text)\">{{ themeLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- ============ DASHBOARD ============ -->\n    <sc-if value=\"{{ isDashboard }}\" hint-placeholder-val=\"{{ true }}\">\n    <div data-screen-label=\"Dashboard\" style=\"padding:26px 28px;display:flex;flex-direction:column;gap:22px;animation:mp-fade .25s ease\">\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:16px\">\n        <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow)\">\n          <div style=\"font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em\">Awaiting approval<\u002Fdiv>\n          <div style=\"font-family:'Poppins',sans-serif;font-size:26px;font-weight:600;margin-top:10px\">{{ approvalCount }}<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:var(--muted);margin-top:4px\">requests that need an Admin to sign off<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow)\">\n          <div style=\"font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em\">Staff accounts<\u002Fdiv>\n          <div style=\"font-family:'Poppins',sans-serif;font-size:26px;font-weight:600;margin-top:10px\">{{ staffCount }}<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:var(--muted);margin-top:4px\">with access to this panel<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start\">\n        <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden\">\n          <div style=\"display:flex;align-items:center;padding:18px 22px 14px\">\n            <div style=\"font-size:15px;font-weight:800\">Recent actions<\u002Fdiv>\n            <button sc-camel-on-click=\"{{ goAudit }}\" style=\"margin-left:auto;background:none;border:none;color:var(--accent);font-size:12.5px;font-weight:700;cursor:pointer;padding:4px 8px;border-radius:8px;transition:background .15s\" style-hover=\"background:var(--soft)\">View audit log →<\u002Fbutton>\n          <\u002Fdiv>\n          <sc-for list=\"{{ feed }}\" as=\"f\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex;align-items:center;gap:13px;padding:13px 22px;border-top:1px solid var(--line);transition:background .15s;cursor:pointer\" style-hover=\"background:var(--soft)\" sc-camel-on-click=\"{{ f.open }}\">\n              <div style=\"width:34px;height:34px;border-radius:11px;flex:none;display:grid;place-items:center;color:#fff;font-weight:800;font-size:12.5px;background:{{ f.avBg }}\">{{ f.initial }}<\u002Fdiv>\n              <div style=\"min-width:0;flex:1\">\n                <div style=\"font-size:13.5px;font-weight:600\"><span style=\"color:{{ f.color }};font-weight:800\">{{ f.type }}<\u002Fspan> · {{ f.target }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ f.reason }} — by {{ f.by }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:11.5px;color:var(--muted);flex:none;font-variant-numeric:tabular-nums\">{{ f.when }}<\u002Fdiv>\n              <span style=\"{{ f.stStyle }}\">{{ f.status }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ noFeed }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:36px;text-align:center;color:var(--muted);font-size:13px;border-top:1px solid var(--line)\">No moderation actions yet.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:16px\">\n          <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow)\">\n            <div style=\"font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em\">Today<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:12px;margin-top:14px\">\n              <div style=\"display:flex;align-items:center;gap:10px\"><span style=\"width:9px;height:9px;border-radius:99px;background:var(--danger)\"><\u002Fspan><span style=\"font-size:13.5px;color:var(--muted)\">Bans<\u002Fspan><span style=\"margin-left:auto;font-size:15px;font-weight:800\">{{ todayBans }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:10px\"><span style=\"width:9px;height:9px;border-radius:99px;background:var(--warn)\"><\u002Fspan><span style=\"font-size:13.5px;color:var(--muted)\">Active mutes<\u002Fspan><span style=\"margin-left:auto;font-size:15px;font-weight:800\">{{ todayMutes }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:10px\"><span style=\"width:9px;height:9px;border-radius:99px;background:var(--violet)\"><\u002Fspan><span style=\"font-size:13.5px;color:var(--muted)\">Kicks<\u002Fspan><span style=\"margin-left:auto;font-size:15px;font-weight:800\">{{ todayKicks }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:10px\"><span style=\"width:9px;height:9px;border-radius:99px;background:var(--ok)\"><\u002Fspan><span style=\"font-size:13.5px;color:var(--muted)\">Warnings<\u002Fspan><span style=\"margin-left:auto;font-size:15px;font-weight:800\">{{ todayWarns }}<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow)\">\n            <div style=\"font-size:14px;font-weight:800\">Action queue<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:var(--muted);margin-top:6px;line-height:1.5\">{{ pendingCount }} executing on the server · {{ approv lc(100vw - 40px);background:var(--surface);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow-lg);padding:26px;animation:mp-pop .25s cubic-bezier(.2,.8,.25,1);display:flex;flex-direction:column;gap:16px\">\n    <div style=\"display:flex;align-items:center;gap:13px\">\n      <div style=\"width:44px;height:44px;border-radius:14px;flex:none;display:grid;place-items:center;color:#fff;font-weight:800;font-size:16px;background:{{ manage.avBg }}\">{{ manage.initial }}<\u002Fdiv>\n      <div>\n        <div style=\"font-size:17px;font-weight:800;letter-spacing:-.01em\">{{ manage.name }}<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:var(--muted);margin-top:2px\">{{ manage.handle }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:8px\">\n      <label style=\"font-size:12px;font-weight:600;color:var(--muted)\">Role<\u002Flabel>\n      <div style=\"display:flex;gap:6px;flex-wrap:wrap\">\n        <sc-for list=\"{{ manageRoles }}\" as=\"r\" hint-placeholder-count=\"4\">\n          <button sc-camel-on-click=\"{{ r.pick }}\" style=\"{{ r.style }}\" style-active=\"transform:scale(.97)\">{{ r.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:8px\">\n      <label style=\"font-size:12px;font-weight:600;color:var(--muted)\">Permissions<\u002Flabel>\n      <div style=\"display:flex;flex-direction:column;background:var(--raised);border-radius:14px;overflow:hidden\">\n        <sc-for list=\"{{ managePerms }}\" as=\"pm\" hint-placeholder-count=\"6\">\n          <button sc-camel-on-click=\"{{ pm.toggle }}\" style=\"display:flex;align-items:center;gap:10px;background:none;border:none;border-bottom:1px solid var(--line);padding:11px 14px;cursor:pointer;text-align:left;transition:background .15s\" style-hover=\"background:var(--soft)\">\n            <span style=\"font-size:13px;font-weight:600;color:var(--text);flex:1\">{{ pm.label }}<\u002Fspan>\n            <span style=\"{{ pm.trackStyle }}\"><span style=\"{{ pm.knobStyle }}\"><\u002Fspan><\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:10px\">\n      <button sc-camel-on-click=\"{{ closeManage }}\" style=\"flex:1;background:var(--raised);border:1px solid var(--line);color:var(--text);border-radius:999px;padding:12px;font-size:13.5px;font-weight:700;cursor:pointer;transition:background .15s\" style-hover=\"background:var(--soft)\" style-active=\"transform:scale(.98)\">Cancel<\u002Fbutton>\n      <button sc-camel-on-click=\"{{ saveManage }}\" style=\"flex:1;background:var(--accent);border:none;color:var(--on-accent);border-radius:999px;padding:12px;font-size:13.5px;font-weight:800;cursor:pointer;transition:filter .15s\" style-hover=\"filter:brightness(1.1)\" style-active=\"transform:scale(.98)\">Save changes<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ TOASTS ============ -->\n<div style=\"position:fixed;right:20px;bottom:20px;z-index:100;display:flex;flex-direction:column;gap:10px;pointer-events:none\">\n  <sc-for list=\"{{ toastsView }}\" as=\"t\" hint-placeholder-count=\"0\">\n    <div style=\"display:flex;align-items:center;gap:11px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 16px;box-shadow:var(--shadow-lg);min-width:260px;max-width:360px;animation:mp-toast .25s cubic-bezier(.2,.8,.25,1);pointer-events:auto\">\n      <sc-if value=\"{{ t.spin }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:14px;height:14px;border-radius:99px;border:2.5px solid {{ t.color }};border-top-color:transparent;animation:mp-spin .8s linear infinite;flex:none\"><\u002Fspan><\u002Fsc-if>\n      <sc-if value=\"{{ t.dot }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:9px;height:9px;border-radius:99px;background:{{ t.color }};flex:none\"><\u002Fspan><\u002Fsc-if>\n      <div style=\"font-size:13px;font-weight:600;line-height:1.4\">{{ t.msg }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fx-dc>\n\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;dark&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;light&quot;],&quot;tsType&quot;:&quot;'dark'|'light'&quot;,&quot;section&quot;:&quot;Theme&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.SB_URL = 'https://jaednahuxpjwrqjqytrt.supabase.co';\n    this.SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImphZWRuYWh1eHBqd3JxanF5dHJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MzgwODQsImV4cCI6MjA5OTIxNDA4NH0.N30ZCl1afMAMFGd-D--5Ulq7VP4qB9aiBQbdRmwDumQ';\n    this.state = {\n      authed: false, me: null,\n      loginUser: '', loginPw: '', loginError: '',\n      screen: 'dashboard',\n      theme: null,\n      server: localStorage.getItem('instellar_server') || 'instellar1',\n      search: '', playerFilter: 'All',\n      auditQuery: '', auditFilter: 'All',\n      selectedId: null,\n      pickedAction: 'Warn',\n      reason: '', duration: '7 days',\n      confirm: null,\n      toasts: [],\n      audit: [],\n      staff: [],\n      notes: [],\n      notesLocal: {},\n      invite: null,\n      manage: null,\n      jOpen: false, jWhat: '', jWhy: '', jAfter: '',\n      justify: JSON.parse(localStorage.getItem('instellar_justify') || '[]'),\n      gOpen: false, gTitle: '', gBody: '',\n      guides: JSON.parse(localStorage.getItem('instellar_guides') || '[]'),\n      nextId: 200\n    };\n  }\n\n  sb() {\n    if (!this._sb) this._sb = window.supabase.createClient(this.SB_URL, this.SB_KEY);\n    return this._sb;\n  }\n\n  myName() { return this.state.me ? this.state.me.display_name : ''; }\n\n  serverName(id) { return id === 'instellar2' ? 'Instellar 2' : 'Instellar 1'; }\n\n  setServer(id) {\n    if (id === this.state.server) return;\n    localStorage.setItem('instellar_server', id);\n    this.state.server = id;\n    this.setState({\n      server: id, selectedId: null, confirm: null, audit: [], staff: [], notes: [],\n      search: '', auditQuery: '', playerFilter: 'All', auditFilter: 'All',\n      justify: JSON.parse(localStorage.getItem('instellar_justify') || '[]'),\n      guides: JSON.parse(localStorage.getItem('instellar_guides') || '[]')\n    });\n    this.loadData(); this.loadJustify(); this.loadGuides();\n    this.toast('ok', 'Switched to ' + this.serverName(id) + '.');\n  }\n\n  warnUpgrade() {\n    if (this._srvWarned) return;\n    this._srvWarned = true;\n    this.toast('fail', 'Database not split yet — run supabase/two-servers-upgrade.sql, showing combined data.');\n  }\n\n  // Insert that tolerates a database that hasn't been upgraded\n  // with the per-server column yet.\n  async sbInsert(table, row) {\n    let res = await this.sb().from(table).insert(row);\n    if (res.error && String(res.error.message).toLowerCase().includes('server')) {\n      this.warnUpgrade();\n      const copy = { ...row };\n      delete copy.server;\n      res = await this.sb().from(table).insert(copy);\n    }\n    return res;\n  }\n\n  timeAgo(iso) {\n    const d = new Date(iso), diff = Date.now() - d.getTime();\n    if (diff < 60000) return 'Just now';\n    if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';\n    if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';\n    if (diff < 7 * 86400000) return Math.floor(diff / 86400000) + 'd ago';\n    return d.toLocaleDateString();\n  }\n\n  async loadData() {\n    const sb = this.sb();\n    const srv = this.state.server;\n    let [a, st, n] = await Promise.all([\n      sb.from('mod_actions').select('*').eq('server', srv).order('created_at', { ascending: false }).limit(300),\n      sb.from('staff').select('*').eq('server', srv).order('created_at', { ascending: true }),\n      sb.from('player_notes').select('*').eq('server', srv).order('created_at', { ascending: true }).limit(1000)\n    ]);\n    if (a.error && String(a.error.message).toLowerCase().includes('server')) {\n      this.warnUpgrade();\n      [a, st, n] = await Promise.all([\n        sb.from('mod_actions').select('*').order('created_at', { ascending: false }).limit(300),\n        sb.from('staff').select('*').order('created_at', { ascending: true }),\n        sb.from('player_notes').select('*').order('created_at', { ascending: true }).limit(1000)\n      ]);\n    }\n    if (a.error || st.error) { this.toast('fail', 'Could not load data: ' + (a.error || st.error).message); return; }\n    if (srv !== this.state.server) return; // switched while loading\n    this.setState({ audit: a.data, staff: st.data, notes: n.error ? this.state.notes : n.data });\n  }\n\n  startLive() {\n    if (this._live) return;\n    this._live = this.sb().channel('panel-live')\n      .on('postgres_changes', { event: '*', schema: 'public', table: 'mod_actions' }, () => this.loadData())\n      .on('postgres_changes', { event: '*', schema: 'public', table: 'staff' }, () => this.loadData())\n      .on('postgres_changes', { event: '*', schema: 'public', table: 'player_notes' }, () => this.loadData())\n      .on('postgres_changes', { event: '*', schema: 'public', table: 'staff_logs' }, () => this.loadJustify())\n      .on('postgres_changes', { event: '*', schema: 'public', table: 'guides' }, () => this.loadGuides())\n      .subscribe();\n    this._poll = setInterval(() => { if (this.state.authed) this.loadData(); }, 15000);\n  }\n\n  stopLive() {\n    if (this._poll) { clearInterval(this._poll); this._poll = null; }\n    if (this._live) { this.sb().removeChannel(this._live); this._live = null; }\n  }\n\n  async finishLogin(uid) {\n    const { data: me, error } = await this.sb().from('staff').select('*').eq('id', uid).single();\n    if (error || !me) {\n      await this.sb().auth.signOut();\n      this.setState({ loginError: 'This ac
