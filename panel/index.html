  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

alue=\"{{ isLogin }}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Login\" style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px\">\n  <div style=\"width:380px;max-width:100%;display:flex;flex-direction:column;gap:22px;animation:mp-pop .35s ease\">\n    <div style=\"display:flex;flex-direction:column;align-items:center;gap:14px\">\n      <div style=\"width:52px;height:52px;border-radius:16px;background:var(--accent);display:grid;place-items:center\">\n        <div style=\"width:18px;height:18px;background:#fff;border-radius:5px;transform:rotate(45deg)\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:center\">\n        <div style=\"font-size:22px;font-weight:800;letter-spacing:-.02em\">Instellar<\u002Fdiv>\n        <div style=\"font-size:13.5px;color:var(--muted);margin-top:4px\">Sign in to the moderation panel<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:26px;display:flex;flex-direction:column;gap:14px;box-shadow:var(--shadow)\">\n      <div style=\"display:flex;flex-direction:column;gap:6px\">\n        <label style=\"font-size:12.5px;font-weight:600;color:var(--muted)\">Username<\u002Flabel>\n        <input value=\"{{ loginUser }}\" sc-camel-on-change=\"{{ onLoginUser }}\" placeholder=\"Username\" style=\"background:var(--raised);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:14px;color:var(--text);outline:none;transition:border-color .15s\" style-focus=\"border-color:var(--accent)\">\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:6px\">\n        <label style=\"font-size:12.5px;font-weight:600;color:var(--muted)\">Password<\u002Flabel>\n        <input type=\"password\" value=\"{{ loginPw }}\" sc-camel-on-change=\"{{ onLoginPw }}\" sc-camel-on-key-down=\"{{ loginKey }}\" placeholder=\"Password\" style=\"background:var(--raised);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:14px;color:var(--text);outline:none;transition:border-color .15s\" style-focus=\"border-color:var(--accent)\">\n      <\u002Fdiv>\n      <sc-if value=\"{{ loginError }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;align-items:center;gap:8px;background:color-mix(in srgb, var(--danger) 10%, transparent);border-radius:11px;padding:10px 13px\">\n          <span style=\"width:7px;height:7px;border-radius:99px;background:var(--danger);flex:none\"><\u002Fspan>\n          <span style=\"font-size:12.5px;font-weight:600;color:var(--danger)\">{{ loginError }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <button sc-camel-on-click=\"{{ login }}\" style=\"margin-top:6px;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14.5px;font-weight:700;cursor:pointer;transition:transform .1s, filter .15s\" style-hover=\"filter:brightness(1.1)\" style-active=\"transform:scale(.98)\">Sign in<\u002Fbutton>\n      <div style=\"display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px\"><div style=\"flex:1;height:1px;background:var(--line)\"><\u002Fdiv>or<div style=\"flex:1;height:1px;background:var(--line)\"><\u002Fdiv><\u002Fdiv>\n      <button sc-camel-on-click=\"{{ ssoClick }}\" style=\"background:var(--raised);color:var(--text);border:1px solid var(--line);border-radius:12px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s, transform .1s\" style-hover=\"background:var(--soft)\" style-active=\"transform:scale(.98)\">Continue with SSO<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"text-align:center;font-size:12.5px;color:var(--muted)\">Staff access only · contact an admin for an account<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isApp }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"display:flex;min-height:100vh;background:va %)\"><circle cx=\"9\" cy=\"9\" r=\"6\"><\u002Fcircle><path d=\"M14 14l4 4\"><\u002Fpath><\u002Fsvg>\n          <input value=\"{{ auditQuery }}\" sc-camel-on-change=\"{{ onAuditQuery }}\" placeholder=\"Search by player, staff, or reason…\" style=\"width:100%;box-sizing:border-box;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 14px 11px 38px;font-size:13.5px;color:var(--text);outline:none;transition:border-color .15s\" style-focus=\"border-color:var(--accent)\">\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:6px\">\n          <sc-for list=\"{{ auditChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n            <button sc-camel-on-click=\"{{ c.set }}\" style=\"{{ c.style }}\" style-active=\"transform:scale(.97)\">{{ c.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden\">\n        <div style=\"display:grid;grid-template-columns:100px minmax(160px,1.2fr) 130px minmax(180px,1.6fr) 110px 110px;gap:12px;padding:12px 22px;font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em\">\n          <div>Action<\u002Fdiv><div>Target<\u002Fdiv><div>By<\u002Fdiv><div>Reason<\u002Fdiv><div>When<\u002Fdiv><div style=\"text-align:right\">Status<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-for list=\"{{ auditView }}\" as=\"a\" hint-placeholder-count=\"10\">\n          <div style=\"display:grid;grid-template-columns:100px minmax(160px,1.2fr) 130px minmax(180px,1.6fr) 110px 110px;gap:12px;align-items:center;padding:13px 22px;border-top:1px solid var(--line);transition:background .15s\" style-hover=\"background:var(--soft)\">\n            <div><span style=\"font-size:12px;font-weight:800;color:{{ a.color }};background:color-mix(in srgb, {{ a.color }} 13%, transparent);border-radius:99px;padding:4px 11px\">{{ a.type }}<\u002Fspan> :12px;align-items:center;padding:13px 22px;border-top:1px solid var(--line);transition:background .15s\" style-hover=\"background:var(--soft)\">\n            <div style=\"display:flex;align-items:center;gap:12px;min-width:0\">\n              <div style=\"position:relative;flex:none\">\n                <div style=\"width:38px;height:38px;border-radius:12px;display:grid;place-items:center;color:#fff;font-weight:800;font-size:14px;background:{{ s.avBg }}\">{{ s.initial }}<\u002Fdiv>\n                <sc-if value=\"{{ s.online }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"position:absolute;right:-2px;bottom:-2px;width:11px;height:11px;border-radius:99px;background:var(--ok);border:2.5px solid var(--surface)\"><\u002Fspan><\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"min-width:0\">\n                <div style=\"font-size:14px;font-weight:700\">{{ s.name }}<\u002Fdiv>\n                <div style=\"font-size:11.5px;color:var(--muted)\">{{ s.handle }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div><span style=\"font-size:12px;font-weight:800;color:{{ s.roleColor }};background:color-mix(in srgb, {{ s.roleColor }} 13%, transparent);border-radius:99px;padding:4px 11px\">{{ s.role }}<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:5px;flex-wrap:wrap\">\n              <sc-for list=\"{{ s.perms }}\" as=\"pm\" hint-placeholder-count=\"3\">\n                <span style=\"font-size:11px;font-weight:600;color:var(--muted);background:var(--soft);border-radius:99px;padding:3px 9px\">{{ pm }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"font-size:12.5px;color:var(--muted)\">{{ s.lastActive }}<\u002Fdiv>\n            <div style=\"text-align:right\">\n              <button sc-camel-on-click=\"{{ s.openManage }}\" style=\"background:var(--raised);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;transition:background .15s\" style-hover=\"background:var(--soft)\">Manage<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ PLAYER DETAIL SLIDE-OVER ============ -->\n<sc-if value=\"{{ sel }}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Player Detail\" style=\"position:fixed;inset:0;z-index:60\">\n  <div sc-camel-on-click=\"{{ closePanel }}\" style=\"position:absolute;inset:0;background:rgba(5,8,14,.55);animation:mp-fade .2s ease\"><\u002Fdiv>\n  <div style=\"position:absolute;top:12px;right:12px;bottom:12px;width:430px;max-width:calc(100vw - 24px);background:var(--surface);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;animation:mp-slide .28s cubic-bezier(.2,.8,.25,1);overflow:hidden\">\n    <div style=\"padding:22px 24px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px\">\n      <div style=\"width:52px;height:52px;border-radius:16px;flex:none;display:grid;place-items:center;color:#fff;font-weight:800;font-size:19px;background:{{ sel.avBg }}\">{{ sel.initial }}<\u002Fdiv>\n      <div style=\"min-width:0;flex:1\">\n        <div style=\"font-size:18px;font-weight:800;letter-spacing:-.01em\">{{ sel.name }}<\u002Fdiv>\n        <div style=\"font-size:11.5px;color:var(--muted);font-family:ui-monospace,Menlo,monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ sel.uuid }}<\u002Fdiv>\n      <\u002Fdiv>\n      <span style=\"{{ sel.stStyle }}\">{{ sel.status }}<\u002Fspan>\n      <button sc-camel-on-click=\"{{ closePanel }}\" style=\"background:var(--raised);border:1px solid var(--line);color:var(--muted);border-radius:10px;width:32px;height:32px;cursor:pointer;font-size:15px;line-height:1;transition:color .15s\" style-hover=\"color:var(--text)\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"flex:1;overflow-y:auto;padding:22px 24px;display:flex;flex-direction:column;gap:22px\">\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n        <div style=\"background:var(--raised);border-radius:14px;padding:13px 15px\"><div style=\"font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em\">Last seen<\u002Fdiv><div style=\"font-size:13.5px;font-weight:700;margin-top:4px\">{{ sel.lastSeen }}<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:var(--raised);border-radius:14px;padding:13px 15px\"><div style=\"font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em\">Playtime<\u002Fdiv><div style=\"font-size:13.5px;font-weight:700;margin-top:4px\">{{ sel.playtime }}<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:var(--raised);border-radius:14px;padding:13px 15px\"><div style=\"font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em\">First joined<\u002Fdiv><div style=\"font-size:13.5px;font-weight:700;margin-top:4px\">{{ sel.joined }}<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:var(--raised);border-radius:14px;padding:13px 15px\"><div style=\"font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em\">Infractions<\u002Fdiv><div style=\"font-size:13.5px;font-weight:700;margin-top:4px\">{{ sel.infractions }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <div style=\"font-size:13px;font-weight:800;margin-bottom:10px\">Take action<\u002Fdiv>\n        <div style=\"display:flex;gap:6px;flex-wrap:wrap\">\n          <sc-for list=\"{{ actionOpts }}\" as=\"o\" hint-placeholder-count=\"5\">\n            <button sc-camel-on-click=\"{{ o.pick }}\" style=\"{{ o.style }}\" style-active=\"transform:scale(.97)\">{{ o.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ showDuration }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;gap:6px;flex-wrap:wrap;margin-top:10px\">\n            <sc-for list=\"{{ durationOpts }}\" as=\"d\" hint-placeholder-count=\"5\">\n              <button sc-camel-on-click=\"{{ d.pick }}\" style=\"{{ d.style }}\" style-active=\"transform:scale(.97)\">{{ d.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <textarea value=\"{{ reason }}\" sc-camel-on-change=\"{{ onReason }}\" placeholder=\"Reason (required — shown to the player and logged)\" rows=\"2\" style=\"width:100%;box-sizing:border-box;margin-top:10px;background:var(--raised);border:1px solid var(--line);border-radius:12px;padding:11px 13px;font-size:13px;color:var(--text);outline:none;resize:vertical;transition:border-color .15s\" style-focus=\"border-color:var(--accent)\"><\u002Ftextarea>\n        <button sc-camel-on-click=\"{{ requestConfirm }}\" style=\"{{ execStyle }}\" style-active=\"transform:scale(.98)\">{{ execLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div>\n        <div style=\"font-size:13px;font-weight:800;margin-bottom:10px\">Punishment history<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <sc-for list=\"{{ sel.history }}\" as=\"h\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;align-items:center;gap:11px;background:var(--raised);border-radius:13px;padding:11px 14px\">\n              <span style=\"font-size:11.5px;font-weight:800;color:{{ h.color }};background:color-mix(in srgb, {{ h.color }} 13%, transparent);border-radius:99px;padding:3px 10px;flex:none\">{{ h.type }}<\u002Fspan>\n              <div style=\"min-width:0;flex:1\">\n                <div style=\"font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ h.reason }}<\u002Fdiv>\n                <div style=\"font-size:11px;color:var(--muted);margin-top:1px\">by {{ h.by }} · {{ h.when }}<\u002Fdiv>\n              <\u002F quot;,&quot;section&quot;:&quot;Theme&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.SB_URL = 'https://jaednahuxpjwrqjqytrt.supabase.co';\n    this.SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImphZWRuYWh1eHBqd3JxanF5dHJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MzgwODQsImV4cCI6MjA5OTIxNDA4NH0.N30ZCl1afMAMFGd-D--5Ulq7VP4qB9aiBQbdRmwDumQ';\n    this.state = {\n      authed: false, me: null,\n      loginUser: '', loginPw: '', loginError: '',\n      screen: 'dashboard',\n      theme: null,\n      search: '', playerFilter: 'All',\n      auditQuery: '', auditFilter: 'All',\n      selectedId: null,\n      pickedAction: 'Warn',\n      reason: '', duration: '7 days',\n      confirm: null,\n      toasts: [],\n      audit: [],\n      staff: [],\n      notesLocal: {},\n      invite: null,\n      manage: null,\n      nextId: 200\n    };\n  }\n\n  sb() {\n    if (!this._sb) this._sb = window.supabase.createClient(this.SB_URL, this.SB_KEY);\n    return this._sb;\n  }\n\n  myName() { return this.state.me ? this.state.me.display_name : ''; }\n\n  timeAgo(iso) {\n    const d = new Date(iso), diff = Date.now() - d.getTime();\n    if (diff < 60000) return 'Just now';\n    if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';\n    if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';\n    if (diff < 7 * 86400000) return Math.floor(diff / 86400000) + 'd ago';\n    return d.toLocaleDateString();\n  }\n\n  async loadData() {\n    const sb = this.sb();\n    const [a, st] = await Promise.all([\n      sb.from('mod_actions').select('*').order('created_at', { ascending: false }).limit(300),\n      sb.from('staff').select('*').order('created_at', { ascending: true })\n    ]);\n    if (a.error || st.error) { this.toast('fail', 'Could not load data: ' + (a.error || st.error).message); return; }\n    this.setState({ audit: a.data, staff: st.data });\n  }\n\n  startLive() {\n    if (this._live) return;\n    this._live = this.sb().channel('panel-live')\n      .on('postgres_changes', { event: '*', schema: 'public', table: 'mod_actions' }, () => this.loadData())\n      .on('postgres_changes', { event: '*', schema: 'public', table: 'staff' }, () => this.loadData())\n      .subscribe();\n    this._poll = setInterval(() => { if (this.state.authed) this.loadData(); }, 15000);\n  }\n\n  stopLive() {\n    if (this._poll) { clearInterval(this._poll); this._poll = null; }\n    if (this._live) { this.sb().removeChannel(this._live); this._live = null; }\n  }\n\n  async finishLogin(uid) {\n    const { data: me, error } = await this.sb().from('staff').select('*').eq('id', uid).single();\n    if (error || !me) {\n      await this.sb().auth.signOut();\n      this.setState({ loginError: 'This account has no staff access.', authed: false });\n      return;\n    }\n    this.setState({ authed: true, me, loginError: '', loginPw: '' });\n    this.loadData();\n    this.startLive();\n  }\n\n  fakeUuid(name) {\n    let h = 0;\n    for (const c of name) h = (h * 31 + c.charCodeAt(0)) >>> 0;\n    const hex = (h.toString(16) + '9f3c2ab174de08').padEnd(24, '0');\n    return hex.slice(0,8) + '-' + hex.slice(8,12) + '-4' + hex.slice(12,15) + '-a' + hex.slice(15,18) + '-' + hex.slice(0,12);\n  }\n\n  avBg(name) {\n    const pals = ['#5661D6','#2FA97E','#C9863B','#7C6FE8','#3E86C9','#C95D5D'];\n    let h = 0;\n    for (const c of name) h = (h * 17 + c.charCodeAt(0)) % 997;\n    return pals[h % pals.length];\n  }\n\n  actionColor(t) {\n    return {Ban:'var(--danger)',Kick:'#F09B4C',Mute:'var(--warn)',Warn:'#4C9AF0',Unban:'var(--ok)'}[t] || 'var(--muted)';\n  }\n\n  statusStyle(st) {\n    const base = 'font-size:12px;font-weight:800;border-radius:99px;padding:4px 11px;white-space:nowrap;';\n    const m = {\n      Online:  base + 'color:var(--ok);background:color-mix(in srgb, var(--ok) 13%, transparent)',\n      Offline: base + 'color:var(--muted);background:var(--soft)',\n      Banned:  base + 'color:var(--danger);background:color-mix(in srgb, var(--danger) 13%, transparent)',\n      Muted:   base + 'color:var(--warn);background:color-mix(in srgb, var(--warn) 13%, transparent)',\n      Executed:base + 'color:var(--ok);background:color-mix(in srgb, var(--ok) 13%, transparent)',\n      Pending: base + 'color:var(--muted);background:var(--soft)',\n      Approval: base + 'color:var(--warn);background:color-mix(in srgb, var(--warn) 13%, transparent)',\n      Failed:  base + 'color:var(--danger);background:color-mix(in srgb, var(--danger) 13%, transparent)',\n      Denied:  base + 'color:var(--muted);background:var(--soft)'\n    };\n    return m[st] || base;\n  }\n\n  rank(role) { return {Helper:1, Moderator:2, Admin:3, Owner:4}[role] || 0; }\n  requiredRole(type, duration) {\n    if (type === 'Unban') return 'Admin';\n    if (type === 'Ban' && duration === 'Permanent') return 'Admin';\n    if (type === 'Ban') return 'Moderator';\n    return 'Helper';\n  }\n  needsApproval(type, duration) { return this.rank(this.currentRole()) < this.rank(this.requiredRole(type, duration)); }\n  currentRole() { return this.state.me ? this.state.me.role : 'Helper'; }\n\n  async tryLogin() {\n    const u = this.state.loginUser.trim().toLowerCase();\n    if (!u || !this.state.loginPw) { this.setState({ loginError: 'Enter your username and password.' }); return; }\n    if (!window.supabase) { this.setState({ loginError: 'Still connecting — try again in a second.' }); return; }\n    const { data, error } = await this.sb().auth.signInWithPassword({ email: u + '@staff.instellar', password: this.state.loginPw });\n    if (error || !data.user) { this.setState({ loginError: 'Incorrect username or password.' }); return; }\n    this.finishLogin(data.user.id);\n  }\n\n  componentDidMount() {\n    this.applyTheme();\n    const boot = () => {\n      if (!window.supabase) { setTimeout(boot, 300); return; }\n      this.sb().auth.getSession().then(({ data }) => {\n        if (data && data.session
